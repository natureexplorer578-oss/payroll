<!DOCTYPE html>
<html>

<head>

    <title>Edit Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f7fc;
            padding:40px;
            font-family:Arial;
        }

        .card{
            border:none;
            border-radius:20px;
            padding:30px;
            box-shadow:0 0 20px rgba(0,0,0,0.1);
        }

        h2{
            margin-bottom:20px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h2>Edit Employee</h2>

        <form action="/update_employee/{{ employee[0] }}" method="POST">

            <div class="row">

                <div class="col-md-6">

                    <label>Name</label>

                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        value="{{ employee[1] }}"
                        required
                    >

                </div>

                <div class="col-md-6">

                    <label>Department</label>

                    <input
                        type="text"
                        name="department"
                        class="form-control"
                        value="{{ employee[2] }}"
                        required
                    >

                </div>

            </div>

            <div class="row mt-4">

                <div class="col-md-4">

                    <label>Salary</label>

                    <input
                        type="number"
                        name="salary"
                        class="form-control"
                        value="{{ employee[3] }}"
                        required
                    >

                </div>

                <div class="col-md-4">

                    <label>Bonus</label>

                    <input
                        type="number"
                        name="bonus"
                        class="form-control"
                        value="{{ employee[4] }}"
                        required
                    >

                </div>

                <div class="col-md-4">

                    <label>Deduction</label>

                    <input
                        type="number"
                        name="deduction"
                        class="form-control"
                        value="{{ employee[5] }}"
                        required
                    >

                </div>

            </div>

            <button class="btn btn-primary mt-4">

                Update Employee

            </button>

        </form>

    </div>

</div>

</body>
</html>
