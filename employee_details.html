<!DOCTYPE html>
<html>
<head>
    <title>Employee Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f5f6fa;">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h2 class="mb-4">Employee Details</h2>

        <table class="table">

            <tr>
                <th>Name</th>
                <td>{{ employee[1] }}</td>
            </tr>

            <tr>
                <th>Department</th>
                <td>{{ employee[2] }}</td>
            </tr>

            <tr>
                <th>Salary</th>
                <td>₹ {{ employee[3] }}</td>
            </tr>

            <tr>
                <th>Bonus</th>
                <td>₹ {{ employee[4] }}</td>
            </tr>

            <tr>
                <th>Deduction</th>
                <td>₹ {{ employee[5] }}</td>
            </tr>

            <tr>
                <th>Net Salary</th>
                <td>₹ {{ employee[14] }}</td>
            </tr>

        </table>

        <a href="/employees" class="btn btn-dark">
            Back
        </a>

    </div>

</div>

</body>
</html>
