<!DOCTYPE html>
<html>

<head>

    <title>SmartPayroll Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:20px;
            width:400px;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h2 class="text-center mb-4">
        SmartPayroll ERP
    </h2>

    <form action="/login" method="POST">

        <input
            type="text"
            name="username"
            class="form-control mb-3"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            class="form-control mb-3"
            placeholder="Password"
            required
        >

        <button class="btn btn-primary w-100">
            Login
        </button>

    </form>

</div>

</body>
</html>
